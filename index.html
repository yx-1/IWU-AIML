<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoSort - Waste Sorting App</title>
    <style>

        .browse-subtitle { font-size: 14px; opacity: 0.9; margin-bottom: 15px; }

        .search-box input { width: 100%; padding: 12px 12px 12px 40px; border: none; border-radius: 10px; font-size: 14px; }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #999; }

        .section-title { font-size: 18px; font-weight: bold; color: #333; }
        .section-count { font-size: 13px; color: #666; }
        .popular-items { padding: 0 20px 20px; display: flex; gap: 10px; overflow-x: auto; }
        .popular-item { min-width: 140px; background: white; border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; border: 2px solid #f0f0f0; transition: all 0.3s; }
        .popular-item:hover { transform: translateY(-3px); box-shadow: 0 6px 16px rgba(0,0,0,0.1); border-color: #3b82f6; }
        .popular-icon { font-size: 36px; margin-bottom: 8px; }
        .popular-name { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
        .popular-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; display: inline-block; }
        .categories-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 20px 20px; }
        .category-card { background: white; border-radius: 15px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.3s; border: 2px solid #f0f0f0; position: relative; }
        .category-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); border-color: #3b82f6; }
        .category-icon { font-size: 48px; margin-bottom: 10px; }
        .category-name { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 4px; }
        .category-count { font-size: 11px; color: #999; }
        .category-badge { position: absolute; top: 10px; right: 10px; background: #3b82f6; color: white; font-size: 10px; padding: 3px 8px; border-radius: 10px; font-weight: 600; }
        .page-header { padding: 20px; background: white; border-bottom: 1px solid #e0e0e0; }
        .back-btn { display: flex; align-items: center; background: none; border: none; color: #666; cursor: pointer; padding: 5px 0; margin-bottom: 15px; font-size: 14px; }
        .page-title { display: flex; align-items: center; font-size: 24px; font-weight: bold; }
        .page-title-icon { font-size: 36px; margin-right: 15px; }
        .items-list { padding: 20px; }
        .subcategory-grid { display: grid; grid-template-columns: 1fr; gap: 12px; padding: 20px; }
        .item-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; cursor: pointer; transition: all 0.3s; border: 2px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; }

        .item-left { display: flex; align-items: center; flex: 1; }
        .item-icon { font-size: 32px; margin-right: 15px; }
        .item-info { flex: 1; }
        .item-name { font-weight: 600; margin-bottom: 4px; font-size: 14px; }
        .item-desc { font-size: 11px; color: #999; margin-bottom: 4px; }
        .item-badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
        .badge-recyclable { background: #dcfce7; color: #16a34a; }
        .badge-compost { background: #fef3c7; color: #d97706; }
        .badge-trash { background: #fce7f3; color: #be185d; }
        .badge-hazardous { background: #fee2e2; color: #dc2626; }
        .badge-ewaste { background: #dbeafe; color: #2563eb; }
        .badge-special { background: #f3e8ff; color: #9333ea; }
        .detail-header { text-align: center; padding: 30px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .detail-icon { font-size: 72px; margin-bottom: 15px; }
        .detail-title { font-size: 24px; font-weight: bold; margin-bottom: 12px; }
        .detail-category { display: inline-block; padding: 8px 20px; border-radius: 20px; font-weight: 600; background: rgba(255,255,255,0.2); }
        .detail-content { padding: 20px; }
        .detail-section { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .section-title-detail { font-size: 16px; font-weight: bold; margin-bottom: 12px; display: flex; align-items: center; }
        .section-icon { font-size: 20px; margin-right: 8px; }

        .chat-header h2 { font-size: 20px; margin-bottom: 5px; }
        .chat-subtitle { font-size: 13px; opacity: 0.9; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; background: #f9fafb; }

        .message.user .message-bubble { background: #3b82f6; color: white; }
        .chat-input-area { padding: 15px; background: white; border-top: 1px solid #e0e0e0; }
        .quick-buttons { display: flex; gap: 8px; margin-bottom: 10px; overflow-x: auto; }
        .quick-btn { padding: 6px 12px; background: #f3f4f6; border: none; border-radius: 15px; font-size: 12px; cursor: pointer; white-space: nowrap; }
        .quick-btn:hover { background: #e5e7eb; }
        .chat-input-box { display: flex; gap: 10px; }
        .chat-input-box input { flex: 1; padding: 12px; border: 2px solid #e5e7eb; border-radius: 20px; font-size: 14px; }
        .chat-input-box button { padding: 12px 20px; background: #3b82f6; color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: 600; }
        .learn-content { padding: 20px; }
        .learn-header-text { margin-bottom: 25px; }
        .learn-header-text h2 { font-size: 24px; font-weight: bold; margin-bottom: 8px; }
        .learn-header-text p { color: #666; }
        .learn-cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 25px; }
        .learn-card { background: white; border-radius: 12px; padding: 20px; cursor: pointer; transition: all 0.3s; border: 2px solid #f0f0f0; }
        .learn-card:hover { transform: translateY(-3px); box-shadow: 0 8px 16px rgba(0,0,0,0.1); border-color: #3b82f6; }
        .learn-card-icon { font-size: 40px; margin-bottom: 10px; }
        .learn-card-title { font-weight: bold; margin-bottom: 8px; font-size: 14px; }
        .learn-card-desc { font-size: 12px; color: #666; }
        .impact-card { background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%); color: white; border-radius: 15px; padding: 25px; margin-bottom: 25px; }
        .impact-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .impact-title { font-size: 20px; font-weight: bold; }
        .impact-subtitle { font-size: 13px; opacity: 0.9; }
        .impact-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .stat { text-align: center; }
        .stat-value { font-size: 28px; font-weight: bold; margin-bottom: 5px; }
        .stat-label { font-size: 11px; opacity: 0.9; }
        .achievements { background: white; border-radius: 15px; padding: 20px; }
        .achievements-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; }
        .badges-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .badge { text-align: center; padding: 15px 10px; background: #f9fafb; border-radius: 10px; }
        .badge.locked { opacity: 0.4; }
        .badge-icon-achieve { font-size: 32px; margin-bottom: 8px; }
        .badge-name { font-size: 10px; font-weight: 600; }
    </style>
</head>

                    </div>
                    
                    <div class="section-header">
                        <div class="section-title">🔥 Most Searched</div>
                        <div class="section-count">${popularItems.length} items</div>
                    </div>
                    <div class="popular-items">
                        ${popularItems.map(p => `
                            <div class="popular-item" onclick="showItemDetail('${p.id}')">
                                <div class="popular-icon">${p.icon}</div>
                                <div class="popular-name">${p.name}</div>
                                <span class="popular-badge badge-${p.badge}">${p.category}</span>
                            </div>
                        `).join('')}
                    </div>

                    <div class="section-header">
                        <div class="section-title">📂 All Categories</div>
                        <div class="section-count">${Object.keys(categories).length} categories</div>
                    </div>
                    <div class="categories-grid">
                        ${Object.values(categories).map(c => {
                            const itemCount = Object.values(c.subCategories).reduce((sum, sub) => sum + sub.items.length, 0);
                            return `
                            <div class="category-card" onclick="selectedCategory = '${c.id}'; renderBrowse()">
                                ${c.new ? '<div class="category-badge">NEW</div>' : ''}
                                <div class="category-icon">${c.icon}</div>
                                <div class="category-name">${c.name}</div>
                                <div class="category-count">${itemCount} items</div>
                            </div>
                        `}).join('')}
                    </div>
                `;
            }
        }

        function showItemDetail(id) {
            const item = findItem(id);
            if (!item) return;
            document.getElementById('content').innerHTML = `
                <div class="detail-header">
                    <div class="detail-icon">${item.icon}</div>
                    <div class="detail-title">${item.name}</div>
                    <div class="detail-category">${item.category}</div>
                </div>
                <div class="detail-content">
                    <button class="back-btn" onclick="renderBrowse()">← Back</button>
                    <div class="detail-section">
                        <div class="section-title-detail"><span class="section-icon">🔧</span>How to Prepare</div>
                        <ul>${item.preparation.map(p => `<li>${p}</li>`).join('')}</ul>
                    </div>
                    <div class="detail-section">
                        <div class="section-title-detail"><span class="section-icon">💡</span>Why This Category?</div>
                        <p>${item.reason}</p>
                    </div>
                    <div class="detail-section">
                        <div class="section-title-detail"><span class="section-icon">📍</span>Local Notes</div>
                        <p>${item.localNote}</p>
                    </div>
                    <div class="detail-section">
                        <div class="section-title-detail"><span class="section-icon">✨</span>Fun Fact</div>
                        <p>${item.funFact}</p>
                    </div>
                </div>
            `;
        }

        function findItem(id) {
            for (const cat of Object.values(categories)) {
                for (const sub of Object.values(cat.subCategories)) {
                    const item = sub.items.find(i => i.id === id);
                    if (item) return item;
                }
            }
        }

        function renderChat() {
            document.getElementById('content').innerHTML = `
                <div class="chat-container">
                    <div class="chat-header">
                        <h2>💬 Chat with EcoBot</h2>
                        <div class="chat-subtitle">Get instant answers about any item!</div>
                    </div>
                    <div class="chat-messages" id="chatMessages">
                        ${chatMessages.map(m => `
                            <div class="message ${m.sender}">
                                <div class="message-bubble">${m.text}</div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="chat-input-area">
                        <div class="quick-buttons">
                            <button class="quick-btn" onclick="sendQuick('Pizza boxes?')">🍕 Pizza?</button>
                            <button class="quick-btn" onclick="sendQuick('Batteries?')">🔋 Batteries?</button>
                            <button class="quick-btn" onclick="sendQuick('Plastic bottles?')">🍾 Plastic?</button>
                            <button class="quick-btn" onclick="sendQuick('Compost?')">🌱 Compost?</button>
                        </div>
                        <div class="chat-input-box">
                            <input type="text" id="chatInput" placeholder="Ask me anything..." onkeypress="if(event.key==='Enter')sendMessage()">
                            <button onclick="sendMessage()">Send</button>
                        </div>
                    </div>
                </div>
            `;
            setTimeout(() => {
                const el = document.getElementById('chatMessages');
                if (el) el.scrollTop = el.scrollHeight;
            }, 100);
        }

        function sendQuick(text) {
            document.getElementById('chatInput').value = text;
            sendMessage();
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;
            chatMessages.push({ sender: 'user', text });
            input.value = '';
            setTimeout(() => {
                chatMessages.push({ sender: 'bot', text: getAIResponse(text) });
                renderChat();
            }, 600);
            renderChat();
        }

        function renderLearn() {
            document.getElementById('content').innerHTML = `
                <div class="learn-content">
                    <div class="learn-header-text">
                        <h2>📚 Learn & Grow</h2>
                        <p>Become a waste sorting expert!</p>
                    </div>
                    <div class="learn-cards">
                        <div class="learn-card">
                            <div class="learn-card-icon">♻️</div>
                            <div class="learn-card-title">Recycling 101</div>
                            <div class="learn-card-desc">Master the basics</div>
                        </div>
                        <div class="learn-card">
                            <div class="learn-card-icon">🌱</div>
                            <div class="learn-card-title">Composting Guide</div>
                            <div class="learn-card-desc">Turn waste to gold</div>
                        </div>
                        <div class="learn-card">
                            <div class="learn-card-icon">🌍</div>
                            <div class="learn-card-title">Your Impact</div>
                            <div class="learn-card-desc">See the difference</div>
                        </div>
                        <div class="learn-card">
                            <div class="learn-card-icon">💡</div>
                            <div class="learn-card-title">Myths Busted</div>
                            <div class="learn-card-desc">Stop wishcycling</div>
                        </div>
                    </div>
                    <div class="impact-card">
                        <div class="impact-header">
                            <div>
                                <div class="impact-title">Your Impact</div>
                                <div class="impact-subtitle">You're making a real difference!</div>
                            </div>
                            <div style="font-size:40px;">📈</div>
                        </div>
                        <div class="impact-stats">
                            <div class="stat"><div class="stat-value">127</div><div class="stat-label">Items Sorted</div></div>
                            <div class="stat"><div class="stat-value">45kg</div><div class="stat-label">CO₂ Saved</div></div>
                            <div class="stat"><div class="stat-value">89%</div><div class="stat-label">Accuracy</div></div>
                        </div>
                    </div>
                    <div class="achievements">
                        <div class="achievements-title">🏆 Achievements</div>
                        <div class="badges-grid">
                            <div class="badge"><div class="badge-icon-achieve">🌱</div><div class="badge-name">First Sort</div></div>
                            <div class="badge"><div class="badge-icon-achieve">♻️</div><div class="badge-name">Recycling Pro</div></div>
                            <div class="badge"><div class="badge-icon-achieve">🔥</div><div class="badge-name">7-Day Streak</div></div>
                            <div class="badge locked"><div class="badge-icon-achieve">🏆</div><div class="badge-name">Master Sorter</div></div>
                        </div>
                    </div>
                </div>
            `;
        }

        renderBrowse();
    </script>
</body>
</html>
